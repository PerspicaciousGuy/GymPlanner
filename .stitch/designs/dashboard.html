<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;

            background: linear-gradient(135deg, #afc6ff 0%, #2E7DFF 100%);

            background: linear-gradient(135deg, #afc6ff 0%, #2E7DFF 100%);

            -webkit-text-fill-color: transparent;
        }

<style>
    body {

<body class="bg-background text-on-background font-body min-h-screen pb-32">
<!-- TopAppBar -->

<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full overflow-hidden bg-surface-container-high ring-2 ring-primary-dim/20">

<div class="flex flex-col">
<span class="font-['Manrope'] font-semibold text-[10px] uppercase tracking-[0.1em] text-on-surface-variant">MONDAY, OCT 24</span>
<h1 class="font-['Lexend'] font-bold text-2xl tracking-tight uppercase text-[#afc6ff]">NUTRITION SUMMARY</h1>
</div>
</div>
<button class="text-[#afc6ff] hover:opacity-80 transition-opacity active:scale-95 duration-200">
<span class="material-symbols-outlined">calendar_today</span>
</button>
</header>
<main class="pt-28 px-6 space-y-12 max-w-2xl mx-auto">
<!-- Main Progress Card -->
<section class="relative flex flex-col items-center">
<div class="relative w-72 h-72 flex items-center justify-center">
<!-- Kinetic Ring -->
<svg class="absolute w-full h-full -rotate-90">
<circle cx="50%" cy="50%" fill="none" r="135" stroke="#202020" stroke-width="4"></circle>
<circle cx="50%" cy="50%" fill="none" r="135" stroke="url(#kineticGradient)" stroke-dasharray="848" stroke-dashoffset="240" stroke-linecap="round" stroke-width="6"></circle>
<defs>
<lineargradient id="kineticGradient" x1="0%" x2="100%" y1="0%" y2="100%">
<stop offset="0%" stop-color="#afc6ff"></stop>
<stop offset="100%" stop-color="#2E7DFF"></stop>
</lineargradient>
</defs>
</svg>
<div class="text-center z-10">
<span class="font-['Manrope'] font-extrabold text-[12px] uppercase tracking-[0.2em] text-on-surface-variant">Calories Left</span>
<div class="flex flex-col items-center">
<span class="font-['Lexend'] text-6xl font-black tracking-tighter leading-none mt-2">1,240</span>
<span class="font-['Lexend'] text-xl font-bold uppercase tracking-tight text-[#afc6ff]">Remaining</span>
</div>
</div>
</div>
<!-- Overlapping Summary Pill -->
<div class="absolute -bottom-6 bg-surface-container-high px-8 py-3 rounded-full flex gap-6 items-center shadow-xl">
<div class="flex flex-col">
<span class="font-['Manrope'] text-[8px] uppercase font-bold text-on-surface-variant tracking-widest">Logged</span>
<span class="font-['Lexend'] text-lg font-bold">1,450</span>
</div>
<div class="w-px h-6 bg-outline-variant/30"></div>
<div class="flex flex-col">
<span class="font-['Manrope'] text-[8px] uppercase font-bold text-on-surface-variant tracking-widest">Goal</span>
<span class="font-['Lexend'] text-lg font-bold">2,690</span>
</div>
</div>
</section>
<!-- Macro Breakdown Section -->
<section class="grid grid-cols-3 gap-4 pt-8">
<!-- Protein -->
<div class="bg-surface-container-low p-5 rounded-lg space-y-4">
<span class="font-['Manrope'] font-bold text-[10px] uppercase tracking-[0.15em] text-on-surface-variant">Protein</span>
<div>
<span class="font-['Lexend'] text-3xl font-bold">120</span>
<span class="font-['Lexend'] text-xs font-medium text-on-surface-variant ml-1">G</span>
</div>
<div class="h-1.5 w-full bg-surface-container-highest rounded-full overflow-hidden">
<div class="h-full kinetic-gradient w-[75%] rounded-full"></div>
</div>
</div>
<!-- Carbs -->
<div class="bg-surface-container-low p-5 rounded-lg space-y-4">
<span class="font-['Manrope'] font-bold text-[10px] uppercase tracking-[0.15em] text-on-surface-variant">Carbs</span>
<div>
<span class="font-['Lexend'] text-3xl font-bold">185</span>
<span class="font-['Lexend'] text-xs font-medium text-on-surface-variant ml-1">G</span>
</div>
<div class="h-1.5 w-full bg-surface-container-highest rounded-full overflow-hidden">
<div class="h-full kinetic-gradient w-[45%] rounded-full"></div>
</div>
</div>
<!-- Fat -->
<div class="bg-surface-container-low p-5 rounded-lg space-y-4">
<span class="font-['Manrope'] font-bold text-[10px] uppercase tracking-[0.15em] text-on-surface-variant">Fat</span>
<div>
<span class="font-['Lexend'] text-3xl font-bold">54</span>
<span class="font-['Lexend'] text-xs font-medium text-on-surface-variant ml-1">G</span>
</div>
<div class="h-1.5 w-full bg-surface-container-highest rounded-full overflow-hidden">
<div class="h-full kinetic-gradient w-[60%] rounded-full"></div>
</div>
</div>
</section>
<!-- Recent Meals Card -->
<section class="space-y-6">
<div class="flex justify-between items-end">
<h2 class="font-['Lexend'] text-xl font-extrabold uppercase tracking-tight">Recent Activity</h2>
<span class="font-['Manrope'] text-[10px] font-bold text-primary uppercase tracking-widest hover:opacity-80 cursor-pointer">View Journal</span>
</div>
<div class="space-y-2.5">
<!-- Breakfast Card -->
<div class="bg-surface-container-low hover:bg-surface-container-high transition-colors p-6 flex justify-between items-center group">
<div class="flex items-center gap-6">
<div class="w-14 h-14 rounded-lg overflow-hidden grayscale group-hover:grayscale-0 transition-all duration-500">

</div>
<div class="flex flex-col">
<span class="font-['Manrope'] text-[10px] font-bold text-on-surface-variant uppercase tracking-[0.1em]">08:30 AM</span>
<span class="font-['Lexend'] text-lg font-bold">Breakfast</span>
<span class="font-['Manrope'] text-xs text-on-surface-variant">Avocado Toast &amp; Poached Egg</span>
</div>
</div>
<div class="text-right">
<span class="font-['Lexend'] text-2xl font-bold">450</span>
<span class="font-['Manrope'] text-[10px] font-bold text-on-surface-variant uppercase ml-1">kcal</span>
</div>
</div>
<!-- Lunch Card -->
<div class="bg-surface-container-high p-6 flex justify-between items-center">
<div class="flex items-center gap-6">
<div class="w-14 h-14 rounded-lg overflow-hidden grayscale group-hover:grayscale-0 transition-all duration-500">
<img alt="Lunch" class="w-full h-full object-cover" data-alt="gourmet salmon salad with fresh greens and citrus dressing on dark slate plate, professional culinary photography" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCSZXCgTwJHuok6GR7GyanbbNclwW_4e6r7PLkY0CXNKlGLdBiZkhF1ZACuRJPBxEAjY9yUDdhDIhLJEV72rMuKrStZnjMRxfb92VFOnen56-vQbFsiSYqF5P92FT3sOdAzaMf0CIYqDh7ZtldTyXU4bQ4i6Dti4BXJB9-sXVAdipLqYHwaQjAK_oTKWV3vVgom-h7dTw1jhnbXL5TMK7-WJ73a7J3hOdYjGU93CgN5o0BPj3Gjx1iUaggfNe7rIYhbOnyG3sieXMhC"/>
</div>
<div class="flex flex-col">
<span class="font-['Manrope'] text-[10px] font-bold text-on-surface-variant uppercase tracking-[0.1em]">01:15 PM</span>
<span class="font-['Lexend'] text-lg font-bold">Lunch</span>
<span class="font-['Manrope'] text-xs text-on-surface-variant">Grilled Salmon &amp; Quinoa</span>
</div>
</div>
<div class="text-right">
<span class="font-['Lexend'] text-2xl font-bold">600</span>
<span class="font-['Manrope'] text-[10px] font-bold text-on-surface-variant uppercase ml-1">kcal</span>
</div>
</div>
</div>
</section>
</main>
<!-- Quick Log Button -->
<button class="fixed bottom-28 right-8 z-50 kinetic-gradient text-on-primary-container px-6 py-4 rounded-full flex items-center gap-3 shadow-[0_10px_30px_rgba(46,125,255,0.3)] active:scale-90 transition-transform">
<span class="material-symbols-outlined font-bold">add</span>
<span class="font-['Manrope'] font-extrabold text-xs uppercase tracking-widest">LOG MEAL</span>

<nav class="fixed bottom-8 w-full z-50 flex justify-around items-center px-8">

<span class="material-symbols-outlined" data-icon="dashboard">dashboard</span>

<span class="material-symbols-outlined" data-icon="restaurant">restaurant</span>
</a>
<a class="flex flex-col items-center justify-center text-[#adaaaa] hover:text-[#afc6ff] transition-all active:scale-90" href="#">
<span class="material-symbols-outlined" data-icon="insights">insights</span>
</a>
<a class="flex flex-col items-center justify-center text-[#adaaaa] hover:text-[#afc6ff] transition-all active:scale-90" href="#">
<span class="material-symbols-outlined" data-icon="person">person</span>
